version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: stockflow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inventory_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ports: # Exposed for local dev only — remove in production
      # - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-inventory_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockflow_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockflow_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-inventory_db}
      SECRET_KEY: ${SECRET_KEY:-changeme-use-a-real-secret}
      APP_ENV: ${APP_ENV:-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:80,http://localhost:3000,http://localhost}
    # ports: # Exposed for local dev only — remove in production
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - stockflow_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ""
    container_name: stockflow_frontend
    restart: unless-stopped
    # ports: # Exposed for local dev only — remove in production
      - "80:80"
    depends_on:
      - backend
    networks:
      - stockflow_net

volumes:
  postgres_data:

networks:
  stockflow_net:
    driver: bridge
